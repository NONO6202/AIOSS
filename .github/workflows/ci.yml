name: CI Pipeline

on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - ".github/workflows/ci.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "tests/**"
      - "week07/**"
      - "week08/**"
      - "README.md"

permissions:
  actions: read
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.detect.outputs.changed-files }}
      changed-count: ${{ steps.detect.outputs.changed-count }}
      deploy-required: ${{ steps.detect.outputs.deploy-required }}
      docs-only: ${{ steps.detect.outputs.docs-only }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Detect changes
        id: detect
        run: node scripts/detect_changed_files.mjs
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

  build:
    name: Build
    needs: detect-changes
    uses: ./.github/workflows/reusable-node-check.yml
    with:
      os: ubuntu-latest
      node-version: "20"
      mode: build
      artifact-name: ci-build-output
    secrets: inherit

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: build
    uses: ./.github/workflows/reusable-node-check.yml
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - "20"
          - "22"
          - "24"
    with:
      os: ${{ matrix.os }}
      node-version: ${{ matrix.node-version }}
      mode: test
      artifact-name: ci-build-output
    secrets: inherit

  deploy:
    name: Deploy artifact preview
    needs:
      - detect-changes
      - test
    if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && needs.detect-changes.outputs.deploy-required == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-build-output
          path: ci-artifacts

      - name: Prepare deploy preview
        run: |
          mkdir -p deploy-preview
          cp ci-artifacts/week02/dashboard.html deploy-preview/index.html
          cp ci-artifacts/week02/assets/dora-dashboard.svg deploy-preview/dora-dashboard.svg
          cp ci-artifacts/artifacts/ci-summary.md deploy-preview/ci-summary.md
          printf 'Changed files: %s\n' "${{ needs.detect-changes.outputs.changed-files }}" > deploy-preview/change-summary.txt

      - name: Upload deploy preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-preview
          path: deploy-preview
