name: Feature Request
description: Propose a new feature or backlog item.
title: "[Feature] "
labels: ["type:feature", "status:backlog"]
body:
  - type: markdown
    attributes:
      value: |
        Propose a sprint backlog item. Keep confidential ESG formulas, source data, and answer data out of public issues.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or workflow problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be built?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: input
    id: story_points
    attributes:
      label: Story Points
      placeholder: "1, 2, 3, 5, 8"
