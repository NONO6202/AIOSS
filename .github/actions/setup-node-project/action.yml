name: Setup Node.js Project
description: Checkout-independent Node.js setup with npm cache and clean install.

inputs:
  node-version:
    description: Node.js version to install.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci
