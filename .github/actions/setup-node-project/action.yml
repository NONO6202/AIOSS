name: Setup Node.js Project
description: Checkout-independent Node.js setup with npm cache and clean install.

inputs:
  node-version:
    description: Node.js version to install.
    required: true
  cache-enabled:
    description: Enable npm dependency cache.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js with npm cache
      if: inputs.cache-enabled == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Setup Node.js without dependency cache
      if: inputs.cache-enabled != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: npm ci
